server:
  host: 0.0.0.0
  port: 8080
  grpc_port: 50051
database:
  url: postgresql://root:password@localhost:5432/skeletondb
  max_connections: 10
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
logging:
  level: info
  format: json
  file: logs/organization.log
module:
  name: organization
  enabled: true
features:
  soft_delete: true
  state_machines: false
  workflows: false
entities:
  branch:
    collection: branches
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  company:
    collection: companies
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  department:
    collection: departments
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  company_industry:
    collection: company_industries
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  industry:
    collection: industries
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
