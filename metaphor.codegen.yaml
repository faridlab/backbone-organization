# Codegen policy for backbone-organization.
#
# `user_owned` globs are hand-written files that live inside generator-owned trees but are
# NOT schema-derived. `metaphor schema generate [--force]` skips them wholesale (never reads,
# merges, or deletes them). Everything else in src/ is regenerated from schema/models.
#
# Re-exports/declarations that must sit alongside generated code live inside
# `// <<< CUSTOM ... // END CUSTOM` markers (service/mod.rs, presentation/http/mod.rs,
# routes/mod.rs, lib.rs) and are preserved by the marker mechanism, not listed here.

user_owned:
  # Company onboarding — atomic Company + head-office Branch + NPWP validation.
  - "src/application/service/onboarding_service.rs"
  - "src/presentation/http/onboarding_handler.rs"

  # Validated write path + guarded route composition (closes the CRUD-bypass hole).
  - "src/application/service/org_write_service.rs"
  - "src/presentation/http/guarded_routes.rs"

  # Own the hand-written org SQL (the company/parent/branch link probes and the branch + department
  # writes) that the validated write path orchestrates. Declared here — not renamed with a `_custom`
  # suffix — so the generator skips them wholesale; this declaration is what makes editing them
  # legitimate.
  - "src/infrastructure/persistence/branch_repository.rs"
  - "src/infrastructure/persistence/company_repository.rs"
  - "src/infrastructure/persistence/department_repository.rs"

  # Behavior tests (the golden cases / oracle) + route-level integrity probes + BDD features.
  - "tests/onboarding_golden_cases.rs"
  - "tests/integrity_probes.rs"
  - "tests/features/**"

  # Hand-authored module documentation.
  - "docs/**"
