components:
  schemas:
    Branch:
      type: object
      required:
        - id
        - company_id
        - code
        - name
        - branch_type
        - is_head_office
        - country
        - status
        - metadata
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 30
        name:
          type: string
          maxLength: 150
        branch_type:
          type: string
        is_head_office:
          type: boolean
        npwp:
          nullable: true
          type: string
          maxLength: 25
        email:
          nullable: true
          type: string
          maxLength: 150
        phone:
          nullable: true
          type: string
          maxLength: 30
        address:
          nullable: true
          type: string
          maxLength: 255
        city:
          nullable: true
          type: string
          maxLength: 100
        province:
          nullable: true
          type: string
          maxLength: 100
        postal_code:
          nullable: true
          type: string
          maxLength: 10
        country:
          type: string
        status:
          type: string
        metadata:
          type: object

    BranchBulkResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Branch'
