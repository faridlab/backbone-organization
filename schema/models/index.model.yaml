# =============================================================================
# Organization Module - Schema Index
# =============================================================================
# Version: 2.0
# Description: Foundation org structure — Company (books owner), Branch, Department.
# The entities every other pillar references (accounting.company_id/branch_id/department_id
# are logical FKs to organization.Company/Branch/Department).
# =============================================================================

module: organization
version: 2
schema: organization
description: "Foundation org structure: Company (books owner), Branch, Department (Indonesia-first)"

config:
  database: postgresql
  soft_delete: true
  audit: true
  default_timestamps: true
  generators:
    disabled:
      - graphql
      - grpc
      - proto

# Reuse sapiens for user identity (managers, actors) — logical refs, no DB constraint.
external_imports:
  - module: sapiens
    types: [User]

# Shared types available to all models in this module.
shared_types:
  Timestamps:
    created_at:
      type: datetime
      attributes: ["@default(now)"]
      description: "Record creation timestamp"
    updated_at:
      type: datetime
      attributes: ["@updated_at"]
      description: "Last update timestamp"
    deleted_at:
      type: datetime?
      description: "Soft delete timestamp"

  Actors:
    created_by:
      type: uuid?
      attributes: ["@foreign_key(sapiens.User.id)"]
      description: "User who created this record"
    updated_by:
      type: uuid?
      attributes: ["@foreign_key(sapiens.User.id)"]
      description: "User who last updated this record"
    deleted_by:
      type: uuid?
      attributes: ["@foreign_key(sapiens.User.id)"]
      description: "User who deleted this record"

  Metadata: [Timestamps, Actors]

imports:
  - company.model.yaml
  - branch.model.yaml
  - department.model.yaml
  - industry.model.yaml
  - company_industry.model.yaml
