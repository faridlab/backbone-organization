# Organization Module - Hooks Index
# Version: 2.0
#
# This file defines module-level configuration for hooks (lifecycle behaviors).
# Hooks define: state machines, rules, permissions, triggers, computed fields.

module: organization
version: 2

# Import all hook files
imports:
  - organization.hook.yaml   # Company/Branch/Department lifecycle state machines + write rules

# =============================================================================
# Module-level configuration
# =============================================================================
config:
  audit:
    retention_days: 365
    archive_after_days: 90
    critical_events: []

  notifications:
    email_enabled: false
    sms_enabled: false
    push_enabled: false

# =============================================================================
# Shared domain events
# =============================================================================
events: {}

# =============================================================================
# Scheduled jobs
# =============================================================================
scheduled_jobs: {}
